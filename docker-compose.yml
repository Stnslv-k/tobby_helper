services:
  ollama:
    image: ollama/ollama:latest
    container_name: voice_bot_ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  bot:
    build:
      context: .
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-small}
    container_name: voice_bot
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      # OAuth callback port — должен быть доступен снаружи для Google redirect
      - "${OAUTH_PORT:-8080}:8080"
    volumes:
      - credentials:/app/credentials
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  credentials:
