services:
  bot:
    build:
      context: .
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-small}
    container_name: asana_bot
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://172.21.0.1:11434
      OLLAMA_API_KEY: ollama-local
    volumes:
      - ./data:/app/data
    restart: unless-stopped
